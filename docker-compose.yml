version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pipeline_g11_dashboard
    ports:
      - "8504:8504"
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8504
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - ./runs:/app/runs
      - ./figures:/app/figures
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'
